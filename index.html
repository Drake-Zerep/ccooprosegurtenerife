<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Próximamente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080c10;
      --surface:  #0d1117;
      --accent:   #00e5ff;
      --accent2:  #7b61ff;
      --text:     #c9d1d9;
      --muted:    #4a5568;
      --white:    #f0f6fc;
      --mono:     'Space Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* ── CANVAS FONDO ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── GRID OVERLAY ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── ESCÁNER HORIZONTAL ── */
    .scan-line {
      position: fixed;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .18;
      z-index: 2;
      animation: scan 6s linear infinite;
    }
    @keyframes scan {
      0%   { top: -2px; }
      100% { top: 100%; }
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 10;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(1.5rem, 4vw, 3rem) clamp(1.5rem, 6vw, 5rem);
    }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeDown .8s ease both;
    }
    .logo {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--white);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .logo span { color: var(--accent); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid #1e2a38;
      padding: .35rem .8rem;
      border-radius: 2rem;
    }
    .status-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .3; }
    }

    /* ── MAIN ── */
    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2.5rem;
    }

    /* etiqueta técnica */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      animation: fadeUp .8s .2s ease both;
    }
    .tag::before {
      content: '';
      display: block;
      width: 24px; height: 1px;
      background: var(--accent);
    }

    /* headline */
    h1 {
      font-family: var(--sans);
      font-weight: 800;
      font-size: clamp(3.2rem, 9vw, 8rem);
      line-height: .95;
      color: var(--white);
      letter-spacing: -.02em;
      animation: fadeUp .8s .35s ease both;
    }
    h1 em {
      font-style: normal;
      -webkit-text-stroke: 1px var(--accent2);
      color: transparent;
    }

    /* subtítulo */
    .subtitle {
      max-width: 38ch;
      font-size: .85rem;
      line-height: 1.8;
      color: var(--muted);
      animation: fadeUp .8s .5s ease both;
    }

    /* ── BARRA DE PROGRESO ── */
    .progress-block {
      display: flex;
      flex-direction: column;
      gap: .6rem;
      animation: fadeUp .8s .65s ease both;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: .6rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .progress-track {
      height: 2px;
      background: #1a2233;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      box-shadow: 0 0 12px var(--accent);
      transition: width 2s cubic-bezier(.16,1,.3,1);
    }

    /* ── CONTACT CTA ── */
    .cta-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      animation: fadeUp .8s .8s ease both;
    }
    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .65rem 1.4rem;
      border: 1px solid #1e2a38;
      border-radius: 3px;
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      transition: border-color .2s, color .2s, box-shadow .2s;
    }
    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 16px rgba(0,229,255,.15);
    }
    .btn-outline svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── FOOTER ── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
      animation: fadeDown .8s 1s ease both;
    }
    .coords {
      font-size: .6rem;
      letter-spacing: .12em;
      color: #2a3a50;
      text-transform: uppercase;
    }
    .counter {
      font-size: .65rem;
      letter-spacing: .08em;
      color: #2a3a50;
      text-align: right;
    }
    .counter span {
      font-size: 1.6rem;
      font-family: var(--sans);
      font-weight: 800;
      color: var(--muted);
      display: block;
      line-height: 1;
    }

    /* ── DECORACIÓN ESQUINA ── */
    .corner {
      position: fixed;
      bottom: clamp(1.5rem, 4vw, 3rem);
      right: clamp(1.5rem, 6vw, 5rem);
      z-index: 5;
      width: 120px; height: 120px;
      pointer-events: none;
    }
    .corner svg { width: 100%; height: 100%; }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 540px) {
      h1 { font-size: clamp(2.8rem, 16vw, 5rem); }
      .corner { display: none; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div class="grid-overlay"></div>
  <div class="scan-line"></div>

  <div class="wrapper">

    <!-- HEADER -->
    <header>
      <div class="logo">Drake<span>Zerep</span></div>
      <div class="status-pill"><span class="dot"></span>En desarrollo</div>
    </header>

    <!-- MAIN -->
    <main>
      <div class="tag">Próximamente</div>

      <h1>No Disponible<br/>Web Off<br/><em>Suspendida</em></h1>

      <p class="subtitle">
        Hasta nuevo aviso, la web queda suspendida.<br/>
        Vuelve pronto — Sentimos las molestias.
      </p>

      <div class="progress-block">
        <div class="progress-meta">
          <span>Progreso del proyecto</span>
          <span id="pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="fill"></div>
        </div>
      </div>

      <div class="cta-row">
        <a class="btn-outline" href="mailto:drakezerep@gmail.com">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          Notifícame
        </a>

      </div>
    </main>

    <!-- FOOTER -->
    <footer>
      <div class="coords">28°29'N — 16°15'W · Tenerife, ES</div>
    </footer>

  </div>

  <!-- DECORACIÓN ESQUINA -->
  <div class="corner">
    <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="55" stroke="#1a2233" stroke-width="1"/>
      <circle cx="60" cy="60" r="40" stroke="#1a2233" stroke-width="1" stroke-dasharray="4 6"/>
      <circle cx="60" cy="60" r="25" stroke="#1e2e44" stroke-width="1"/>
      <circle cx="60" cy="5" r="3" fill="#00e5ff" opacity=".6"/>
      <line x1="60" y1="60" x2="60" y2="8" stroke="#00e5ff" stroke-width=".5" opacity=".3"/>
      <g id="needle" style="transform-origin:60px 60px; animation: spin 8s linear infinite">
        <line x1="60" y1="60" x2="60" y2="22" stroke="#7b61ff" stroke-width="1" opacity=".8"/>
        <circle cx="60" cy="22" r="2" fill="#7b61ff"/>
      </g>
      <circle cx="60" cy="60" r="4" fill="#0d1117" stroke="#00e5ff" stroke-width="1"/>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </svg>
  </div>

  <script>
    /* ── PARTÍCULAS FONDO ── */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 60; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 1.2 + .3,
        vx: (Math.random() - .5) * .15,
        vy: (Math.random() - .5) * .15,
        o: Math.random() * .5 + .1,
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,229,255,${p.o})`;
        ctx.fill();
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;
      });
      requestAnimationFrame(draw);
    }
    draw();

    /* ── BARRA DE PROGRESO ── */
    // Cambia este valor (0–100) según avance real del proyecto
    const PROGRESS = 75;

    setTimeout(() => {
      document.getElementById('fill').style.width = PROGRESS + '%';
      // contador animado
      let cur = 0;
      const pctEl = document.getElementById('pct');
      const step = () => {
        if (cur < PROGRESS) { cur++; pctEl.textContent = cur + '%'; requestAnimationFrame(step); }
      };
      step();
    }, 600);

  </script>
</body>
</html>
